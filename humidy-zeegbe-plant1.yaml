esphome:
  name: "flower-monitor"
  friendly_name: "Flower Monitor"

# Полностью отключаем USB-логирование, чтобы усыпить USB-контроллер чипа
logger:
  level: NONE
  baud_rate: 0

nrf52:
  board: adafruit_itsybitsy_nrf52840
  dcdc: true # ВКЛЮЧАЕМ встроенный DCDC для экономии энергии чипа
  dfu: true

zigbee:
  sleepy: true
  wipe_on_boot: false
  power_source: BATTERY

preferences:
  flash_write_interval: never

deep_sleep:
  id: deep_sleep_control
  run_duration: 10s    # Даем 10 секунд на сопряжение/передачу данных в Zigbee
  sleep_duration: 30min # Сон на 30 минут — боевой интервал для теста rejoin/стабильности

sensor:
  - platform: adc
    pin: P0.02
    name: "Влажность_почвы_1"
    icon: "mdi:water-percent"
    update_interval: 20s
    id: flower_1
  - platform: adc
    pin: P0.03
    name: "Влажность_почвы_2"
    icon: "mdi:water-percent"
    update_interval: 20s
    id: flower_2
  - platform: adc
    pin: P0.04
    name: "Влажность_почвы_3"
    icon: "mdi:water-percent"
    update_interval: 20s
    id: flower_3
  - platform: adc
    pin: P0.05
    name: "Влажность_почвы_4"
    icon: "mdi:water-percent"
    update_interval: 20s
    id: flower_4
  - platform: adc
    pin: P0.31
    name: "Батарея_напряжение"
    icon: "mdi:battery"
    unit_of_measurement: "V"
    update_interval: 20s
    id: battery_voltage
    filters:
      # raw = (Vbat/2) / Vref, divider 470k+470k, Vref assumed 3.6V (nRF52 SAADC default gain 1/6) — не подтверждено, откалибровать по мультиметру после прошивки
      - multiply: 7.2
  - platform: template
    name: "Батарея_процент"
    icon: "mdi:battery-percent"
    unit_of_measurement: "%"
    update_interval: 20s
    id: battery_percent
    lambda: |-
      float v = id(battery_voltage).state;
      if (std::isnan(v)) return {};
      float pct = (v - 3.0f) / (4.2f - 3.0f) * 100.0f;
      if (pct < 0.0f) pct = 0.0f;
      if (pct > 100.0f) pct = 100.0f;
      return pct;
